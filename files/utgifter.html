<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utgifter & Insättningar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --ink: #1a1410;
      --muted: #8a8078;
      --accent: #c8401a;
      --accent2: #2a5c3f;
      --accent3: #1a3a5c;
      --border: #e2ddd7;
      --calc: #f0ede8;
      --nav-bg: #1a1410;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; }
    nav { background: #4a4036; height: 52px; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; height: 52px; }
    nav a { color: #c9c0b6; text-decoration: none; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 0 1.25rem; height: 52px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    nav a:first-child { padding-left: 0; }
    nav a:hover { color: #ffffff; }
    nav a.active { color: #ffffff; border-bottom-color: var(--accent); }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .page-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; margin-bottom: 0.25rem; }
    .page-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.75rem; }
    .card-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .card-title.expense { color: var(--accent); }
    .card-title.bdo { color: var(--accent3); }
    .card-title.lorna { color: var(--accent2); }
    .falt { margin-bottom: 1rem; }
    .falt label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .falt input, .falt textarea { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ink); background: var(--card); outline: none; transition: border-color 0.15s; }
    .falt input:focus, .falt textarea:focus { border-color: var(--ink); }
    .falt textarea { resize: vertical; min-height: 56px; }
    .btn { width: 100%; padding: 9px; border: none; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; margin-top: 0.25rem; }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-expense { background: var(--accent); color: white; }
    .btn-bdo { background: var(--accent3); color: white; }
    .btn-lorna { background: var(--accent2); color: white; }
    .msg { font-size: 11px; margin-top: 0.5rem; min-height: 18px; }
    .msg.ok { color: var(--accent2); }
    .msg.fel { color: var(--accent); }

    /* TABELLER */
    .tabell-sektioner { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    .tabell-kort { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .tabell-huvud { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .tabell-rubrik { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .tabell-rubrik.expense { color: var(--accent); }
    .tabell-rubrik.bdo { color: var(--accent3); }
    .tabell-rubrik.lorna { color: var(--accent2); }
    .ar-sel { padding: 4px 8px; border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; background: var(--bg); color: var(--ink); outline: none; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    thead th { text-align: left; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid #f5f2ee; }
    tbody tr:hover { background: #faf8f5; }
    tbody td { padding: 8px 12px; }
    .del-btn { background: none; border: none; cursor: pointer; color: #d0cac4; font-size: 12px; padding: 1px 5px; border-radius: 2px; transition: all 0.15s; }
    .del-btn:hover { color: var(--accent); background: #fcecea; }
    .tom { text-align: center; padding: 2rem; color: var(--muted); font-size: 11px; }
    .sum-row td { font-weight: 500; border-top: 2px solid var(--border); background: var(--calc); }

    @media (max-width: 900px) {
      .grid-3 { grid-template-columns: 1fr; }
      .tabell-sektioner { grid-template-columns: 1fr; }
    }
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      nav, .grid-3, #skriv-ut-btn, .ar-sel, .del-btn { display: none !important; }
      body { background: white; font-size: 9px; }
      .container { max-width: 100%; padding: 0; }
      .tabell-sektioner { grid-template-columns: 1fr 1fr 1fr !important; gap: 8px !important; }
      .tabell-kort { border: 1px solid #ccc; box-shadow: none; }
      .tabell-huvud { padding: 6px 10px; }
      .tabell-rubrik { font-size: 9px; }
      table { font-size: 8px; }
      thead th { font-size: 7px; padding: 4px 6px; }
      tbody td { padding: 4px 6px; }
      .print-header { display: block !important; font-family: 'DM Mono', monospace; font-size: 11px; margin-bottom: 8px; color: #555; }
    }
    .print-header { display: none; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/">① Körjournal</a>
    <a href="/utgifter" class="active">② Utgifter</a>
    <a href="/summering">③ Summering</a>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">Utgifter & Insättningar</h1>
  <p class="page-sub">Registrera utgifter, BDO- och Lorna-insättningar</p>

  <!-- FORMULÄR -->
  <div class="grid-3">

    <!-- Expensives -->
    <div class="card">
      <div class="card-title expense">Utgift / Expensive</div>
      <div class="falt"><label>Datum</label><input type="date" id="utg-datum" /></div>
      <div class="falt"><label>Kostnad (₱)</label><input type="number" id="utg-belopp" placeholder="0" step="0.01" /></div>
      <div class="falt"><label>Kommentar</label><textarea id="utg-kommentar" placeholder="Vad avser utgiften?"></textarea></div>
      <button class="btn btn-expense" id="utg-btn" onclick="sparaUtgift()">Spara utgift</button>
      <div class="msg" id="utg-msg"></div>
    </div>

    <!-- BDO -->
    <div class="card">
      <div class="card-title bdo">Input BDO</div>
      <div class="falt"><label>Datum</label><input type="date" id="bdo-datum" /></div>
      <div class="falt"><label>Belopp (₱)</label><input type="number" id="bdo-belopp" placeholder="0" step="0.01" /></div>
      <button class="btn btn-bdo" id="bdo-btn" onclick="sparaBdo()">Spara BDO</button>
      <div class="msg" id="bdo-msg"></div>
    </div>

    <!-- Lorna -->
    <div class="card">
      <div class="card-title lorna">Input Lorna</div>
      <div class="falt"><label>Datum</label><input type="date" id="lor-datum" /></div>
      <div class="falt"><label>Belopp (₱)</label><input type="number" id="lor-belopp" placeholder="0" step="0.01" /></div>
      <button class="btn btn-lorna" id="lor-btn" onclick="sparaLorna()">Spara Lorna</button>
      <div class="msg" id="lor-msg"></div>
    </div>

  </div>

  <!-- TABELLER -->
  <div class="print-header" id="print-header"></div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;gap:0.75rem">
    <button class="btn" style="background:transparent;color:var(--muted);border:1px solid var(--border);padding:8px 18px;width:auto" id="skriv-ut-btn" title="Skriv ut alla tre tabeller">&#128438; Skriv ut</button>
  </div>
  <div class="tabell-sektioner">

    <!-- Utgifter tabell -->
    <div class="tabell-kort">
      <div class="tabell-huvud">
        <span class="tabell-rubrik expense">Utgifter</span>
        <select class="ar-sel" id="utg-ar" onchange="hamtaUtgifter()"><option value="">Alla år</option></select>
      </div>
      <table>
        <thead><tr><th>Datum</th><th>₱</th><th>Kommentar</th><th></th></tr></thead>
        <tbody id="utg-tbody"><tr><td colspan="4" class="tom">Laddar...</td></tr></tbody>
      </table>
    </div>

    <!-- BDO tabell -->
    <div class="tabell-kort">
      <div class="tabell-huvud">
        <span class="tabell-rubrik bdo">BDO Insättningar</span>
        <select class="ar-sel" id="bdo-ar" onchange="hamtaBdo()"><option value="">Alla år</option></select>
      </div>
      <table>
        <thead><tr><th>Datum</th><th>₱</th><th></th></tr></thead>
        <tbody id="bdo-tbody"><tr><td colspan="3" class="tom">Laddar...</td></tr></tbody>
      </table>
    </div>

    <!-- Lorna tabell -->
    <div class="tabell-kort">
      <div class="tabell-huvud">
        <span class="tabell-rubrik lorna">Lorna Insättningar</span>
        <select class="ar-sel" id="lor-ar" onchange="hamtaLorna()"><option value="">Alla år</option></select>
      </div>
      <table>
        <thead><tr><th>Datum</th><th>₱</th><th></th></tr></thead>
        <tbody id="lor-tbody"><tr><td colspan="3" class="tom">Laddar...</td></tr></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  // Sätt dagens datum
  ["utg-datum","bdo-datum","lor-datum"].forEach(id => {
    document.getElementById(id).value = new Date().toISOString().split("T")[0];
  });

  function fmt(v) { return Number(v).toLocaleString("sv-SE", {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function visa(elId, txt, typ) {
    const el = document.getElementById(elId);
    el.textContent = (typ==="ok"?"✓ ":"✗ ") + txt;
    el.className = "msg " + typ;
    setTimeout(() => { el.textContent=""; el.className="msg"; }, 3000);
  }

  // ── Utgifter ──
  async function sparaUtgift() {
    const btn = document.getElementById("utg-btn");
    btn.disabled = true;
    try {
      const res = await fetch("/api/utgifter", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ datum: document.getElementById("utg-datum").value, expensives: document.getElementById("utg-belopp").value, kommentar: document.getElementById("utg-kommentar").value })
      });
      const d = await res.json();
      visa("utg-msg", d.meddelande, res.ok?"ok":"fel");
      if (res.ok) { document.getElementById("utg-belopp").value=""; document.getElementById("utg-kommentar").value=""; hamtaUtgifter(); }
    } catch(e) { visa("utg-msg","Anslutningsfel","fel"); }
    btn.disabled = false;
  }

  async function hamtaUtgifter() {
    const ar = document.getElementById("utg-ar").value;
    const res = await fetch("/api/utgifter" + (ar?`?ar=${ar}`:""));
    const data = await res.json();
    const tbody = document.getElementById("utg-tbody");
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" class="tom">Inga utgifter</td></tr>'; return; }
    let sum = 0; data.forEach(r => sum += r.expensives||0);
    tbody.innerHTML = data.map(r => `
      <tr><td>${r.datum}</td><td>${fmt(r.expensives)}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${r.kommentar||""}">${r.kommentar||"–"}</td>
      <td><button class="del-btn" onclick="taBortUtgift(${r.id})">✕</button></td></tr>
    `).join("") + `<tr class="sum-row"><td>Summa</td><td>${fmt(sum)}</td><td colspan="2"></td></tr>`;
  }

  async function taBortUtgift(id) {
    if (!confirm("Ta bort?")) return;
    await fetch("/api/utgifter/"+id, {method:"DELETE"});
    hamtaUtgifter();
  }

  // ── BDO ──
  async function sparaBdo() {
    const btn = document.getElementById("bdo-btn");
    btn.disabled = true;
    try {
      const res = await fetch("/api/bdo", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ datum: document.getElementById("bdo-datum").value, belopp: document.getElementById("bdo-belopp").value })
      });
      const d = await res.json();
      visa("bdo-msg", d.meddelande, res.ok?"ok":"fel");
      if (res.ok) { document.getElementById("bdo-belopp").value=""; hamtaBdo(); }
    } catch(e) { visa("bdo-msg","Anslutningsfel","fel"); }
    btn.disabled = false;
  }

  async function hamtaBdo() {
    const ar = document.getElementById("bdo-ar").value;
    const res = await fetch("/api/bdo" + (ar?`?ar=${ar}`:""));
    const data = await res.json();
    const tbody = document.getElementById("bdo-tbody");
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" class="tom">Inga insättningar</td></tr>'; return; }
    let sum = 0; data.forEach(r => sum += r.belopp||0);
    tbody.innerHTML = data.map(r => `
      <tr><td>${r.datum}</td><td>${fmt(r.belopp)}</td>
      <td><button class="del-btn" onclick="taBortBdo(${r.id})">✕</button></td></tr>
    `).join("") + `<tr class="sum-row"><td>Summa</td><td>${fmt(sum)}</td><td></td></tr>`;
  }

  async function taBortBdo(id) {
    if (!confirm("Ta bort?")) return;
    await fetch("/api/bdo/"+id, {method:"DELETE"});
    hamtaBdo();
  }

  // ── Lorna ──
  async function sparaLorna() {
    const btn = document.getElementById("lor-btn");
    btn.disabled = true;
    try {
      const res = await fetch("/api/lorna", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ datum: document.getElementById("lor-datum").value, belopp: document.getElementById("lor-belopp").value })
      });
      const d = await res.json();
      visa("lor-msg", d.meddelande, res.ok?"ok":"fel");
      if (res.ok) { document.getElementById("lor-belopp").value=""; hamtaLorna(); }
    } catch(e) { visa("lor-msg","Anslutningsfel","fel"); }
    btn.disabled = false;
  }

  async function hamtaLorna() {
    const ar = document.getElementById("lor-ar").value;
    const res = await fetch("/api/lorna" + (ar?`?ar=${ar}`:""));
    const data = await res.json();
    const tbody = document.getElementById("lor-tbody");
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" class="tom">Inga insättningar</td></tr>'; return; }
    let sum = 0; data.forEach(r => sum += r.belopp||0);
    tbody.innerHTML = data.map(r => `
      <tr><td>${r.datum}</td><td>${fmt(r.belopp)}</td>
      <td><button class="del-btn" onclick="taBortLorna(${r.id})">✕</button></td></tr>
    `).join("") + `<tr class="sum-row"><td>Summa</td><td>${fmt(sum)}</td><td></td></tr>`;
  }

  async function taBortLorna(id) {
    if (!confirm("Ta bort?")) return;
    await fetch("/api/lorna/"+id, {method:"DELETE"});
    hamtaLorna();
  }

  // Ladda årslista
  async function laddaAr() {
    const res = await fetch("/api/ar");
    const ar = await res.json();
    ["utg-ar","bdo-ar","lor-ar"].forEach(selId => {
      const sel = document.getElementById(selId);
      ar.forEach(a => { const o = document.createElement("option"); o.value=a; o.textContent=a; sel.appendChild(o); });
    });
    hamtaUtgifter(); hamtaBdo(); hamtaLorna();
  }

  document.getElementById("skriv-ut-btn").addEventListener("click", function() {
    var ar = document.getElementById("utg-ar").value || document.getElementById("bdo-ar").value || document.getElementById("lor-ar").value || "Alla år";
    document.getElementById("print-header").textContent = "Utgifter & Insättningar  |  År: " + ar + "  |  Utskriven: " + new Date().toLocaleDateString("sv-SE");
    window.print();
  });

  laddaAr();
</script>
</body>
</html>
