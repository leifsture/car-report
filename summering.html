<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annual Summary</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --ink: #1a1410;
      --muted: #8a8078;
      --accent: #c8401a;
      --accent2: #2a5c3f;
      --accent3: #1a3a5c;
      --border: #e2ddd7;
      --calc: #f0ede8;
      --nav-bg: #1a1410;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; }
    nav { background: #4a4036; height: 52px; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; height: 52px; }
    nav a { color: #c9c0b6; text-decoration: none; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 0 1.25rem; height: 52px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    nav a:first-child { padding-left: 0; }
    nav a:hover { color: #ffffff; }
    nav a.active { color: #ffffff; border-bottom-color: var(--accent); }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .page-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; margin-bottom: 0.25rem; }
    .page-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2rem; }

    /* ÅR-KORT */
    .ar-kort {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .ar-huvud {
      background: var(--ink);
      color: #f7f4ef;
      padding: 1.25rem 1.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ar-titel {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 300;
    }
    .ar-net {
      text-align: right;
    }
    .ar-net-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #a09890; }
    .ar-net-val { font-size: 20px; color: #7dd4a0; }

    .summeringsrad {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .summeringsrad:last-child { border-bottom: none; }
    .cell {
      padding: 1.25rem 1.25rem;
      border-right: 1px solid var(--border);
      min-width: 0;
    }
    .cell:last-child { border-right: none; }
    .cell-label {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      white-space: nowrap;
    }
    .cell-val {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }
    .cell-val.driver { color: var(--accent); }
    .cell-val.remittance { color: var(--ink); }
    .cell-val.expense { color: var(--accent); }
    .cell-val.net { color: var(--accent2); font-size: 14px; }
    .cell-val.bdo { color: var(--accent3); }
    .cell-val.lorna { color: var(--accent2); }

    .laddar { text-align: center; padding: 4rem; color: var(--muted); font-size: 13px; }
    .tom { text-align: center; padding: 4rem; color: var(--muted); font-size: 13px; }

    .uppdatera-btn {
      padding: 8px 20px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 1.5rem;
    }
    .uppdatera-btn:hover { border-color: var(--ink); color: var(--ink); }

    @media (max-width: 800px) {
      .summeringsrad { grid-template-columns: 1fr 1fr; }
      .cell { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/">① Journal</a>
    <a href="/utgifter">② Expenses</a>
    <a href="/summering" class="active">③ Summary</a>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">Annual Summary</h1>
  <p class="page-sub">Automatic summary per year of all registered data</p>

  <button class="uppdatera-btn" onclick="hamtaSummering()">↻ Refresh</button>

  <div id="innehall">
    <div class="laddar">Loading data...</div>
  </div>
</div>

<script>
  function fmt(v) {
    return Number(v).toLocaleString("sv-SE", {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  async function hamtaSummering() {
    document.getElementById("innehall").innerHTML = '<div class="laddar">Loading data...</div>';
    try {
      const res = await fetch("/api/summering");
      const data = await res.json();

      if (!data.length) {
        document.getElementById("innehall").innerHTML = '<div class="tom">No data registered yet.<br><br><a href="/" style="color:var(--accent)">Go to journal →</a></div>';
        return;
      }

      document.getElementById("innehall").innerHTML = data.map(r => `
        <div class="ar-kort">
          <div class="ar-huvud">
            <span class="ar-titel">${r.ar}</span>
            <div class="ar-net">
              <div class="ar-net-label">Net Remittance</div>
              <div class="ar-net-val">₱ ${fmt(r.net_remittance)}</div>
            </div>
          </div>
          <div class="summeringsrad">
            <div class="cell">
              <div class="cell-label">Driver Salary (25%)</div>
              <div class="cell-val driver">₱ ${fmt(r.driver_salary)}</div>
            </div>
            <div class="cell">
              <div class="cell-label">SUM Remittance</div>
              <div class="cell-val remittance">₱ ${fmt(r.sum_remittance)}</div>
            </div>
            <div class="cell">
              <div class="cell-label">Expenses</div>
              <div class="cell-val expense">₱ ${fmt(r.expensives)}</div>
            </div>
            <div class="cell">
              <div class="cell-label">Net Remittance</div>
              <div class="cell-val net">₱ ${fmt(r.net_remittance)}</div>
            </div>
            <div class="cell">
              <div class="cell-label">Input BDO</div>
              <div class="cell-val bdo">₱ ${fmt(r.input_bdo)}</div>
            </div>
            <div class="cell">
              <div class="cell-label">Input Lorna</div>
              <div class="cell-val lorna">₱ ${fmt(r.input_lorna)}</div>
            </div>
          </div>
        </div>
      `).join("");
    } catch(e) {
      document.getElementById("innehall").innerHTML = '<div class="tom">⚠ Could not connect to server.</div>';
    }
  }

  hamtaSummering();
</script>
</body>
</html>
