<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Körjournal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ef; --card: #ffffff; --ink: #1a1410; --muted: #8a8078;
      --accent: #c8401a; --accent2: #2a5c3f; --accent3: #1a3a5c;
      --border: #e2ddd7; --calc: #f0ede8; --nav-bg: #1a1410;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; }
    nav { background: var(--nav-bg); padding: 0 2rem; display: flex; align-items: center; height: 52px; }
    .nav-brand { font-family: 'Fraunces', serif; font-size: 18px; color: #f7f4ef; margin-right: 2rem; font-weight: 300; }
    nav a { color: #a09890; text-decoration: none; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 0 1.25rem; height: 52px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    nav a:hover { color: #f7f4ef; }
    nav a.active { color: #f7f4ef; border-bottom-color: var(--accent); }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .page-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; margin-bottom: 0.25rem; }
    .page-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; margin-bottom: 2rem; }
    .card-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .row { margin-bottom: 1rem; }
    .falt label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .falt label.cl { color: var(--accent2); }
    .falt input, .falt textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ink); background: var(--card); outline: none; transition: border-color 0.15s; }
    .falt input:focus, .falt textarea:focus { border-color: var(--ink); }
    .falt input.cf { background: var(--calc); color: var(--muted); cursor: default; }
    .falt textarea { resize: vertical; min-height: 60px; }
    .btn-row { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
    .btn-p { padding: 10px 28px; background: var(--ink); color: var(--bg); border: none; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
    .btn-p:hover { opacity: 0.8; }
    .btn-p:disabled { opacity: 0.4; cursor: default; }
    .btn-g { padding: 10px 20px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .btn-g:hover { border-color: var(--ink); color: var(--ink); }
    #msg { padding: 10px 16px; border-radius: 3px; font-size: 12px; display: none; }
    #msg.ok { background: #eaf3e8; color: var(--accent2); border: 1px solid #b8dab4; }
    #msg.fel { background: #fcecea; color: var(--accent); border: 1px solid #f7c4bc; }
    .th { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
    .ar-filter select { padding: 6px 12px; border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px; background: var(--card); color: var(--ink); outline: none; }
    #sok { padding: 6px 12px; border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px; background: var(--card); color: var(--ink); outline: none; width: 220px; }
    .tw { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { text-align: left; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    thead th.cc { color: var(--accent2); }
    tbody tr { border-bottom: 1px solid #f0ede8; }
    tbody tr:hover { background: #faf8f5; }
    tbody td { padding: 10px 12px; white-space: nowrap; }
    tbody td.cv { color: var(--accent2); }
    .db { background: none; border: none; cursor: pointer; color: #d0cac4; font-size: 14px; padding: 2px 6px; border-radius: 3px; transition: all 0.15s; }
    .db:hover { color: var(--accent); background: #fcecea; }
    .eb { background: none; border: none; cursor: pointer; color: #d0cac4; font-size: 14px; padding: 2px 6px; border-radius: 3px; transition: all 0.15s; }
    .eb:hover { color: var(--accent3); background: #e8f0f8; }
    .tom { text-align: center; padding: 3rem; color: var(--muted); font-size: 12px; }
    .sr td { font-weight: 500; border-top: 2px solid var(--border); background: var(--calc); }
    .mo { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
    .mo.open { display: flex; }
    .mi { background: var(--card); border-radius: 6px; padding: 2rem; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    .mt { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .mb { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
    #fran-datum, #till-datum { padding: 6px 10px; border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 12px; background: var(--card); color: var(--ink); outline: none; }
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      nav, .card:first-of-type, .mo, .th, .db, .eb, #msg { display: none !important; }
      body { background: white; font-size: 10px; }
      .container { max-width: 100%; padding: 0; }
      .card { border: none; padding: 0; box-shadow: none; }
      table { font-size: 9px; }
      thead th { font-size: 8px; padding: 5px 6px; }
      tbody td { padding: 5px 6px; }
      .tw { overflow: visible; }
      .print-header { display: block !important; font-family: 'DM Mono', monospace; font-size: 11px; margin-bottom: 8px; color: #555; }
    }
    .print-header { display: none; }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">Körjournal</span>
  <a href="/" class="active">&#9312; Körjournal</a>
  <a href="/utgifter">&#9313; Utgifter</a>
  <a href="/summering">&#9314; Summering</a>
</nav>

<div class="container">
  <h1 class="page-title">Körjournal</h1>
  <p class="page-sub">Registrera körningar — beräkningsfält fylls i automatiskt</p>

  <div class="card">
    <div class="card-title">Ny körning</div>
    <div class="grid grid-2 row">
      <div class="falt"><label>Datum</label><input type="date" id="datum"></div>
      <div class="falt"><label class="cl">Dag (auto)</label><input type="text" id="dag" class="cf" readonly placeholder="Beräknas"></div>
    </div>
    <div class="falt row">
      <label>Rutt (From – To)</label>
      <textarea id="rutt" placeholder="T.ex. Seaport Tagbilaran City - Mayana Guindulman"></textarea>
    </div>
    <div class="grid grid-4 row">
      <div class="falt"><label>Amount (&#8369;)</label><input type="text" id="amount" placeholder="0"></div>
      <div class="falt"><label>Diesel (&#8369;)</label><input type="number" id="diesel" placeholder="0" step="0.01"></div>
      <div class="falt"><label class="cl">Driver Income 25% (auto)</label><input type="text" id="driver_income" class="cf" readonly placeholder="0.00"></div>
      <div class="falt"><label class="cl">Remittance (auto)</label><input type="text" id="remittance" class="cf" readonly placeholder="0.00"></div>
    </div>
    <div class="grid grid-4 row">
      <div class="falt"><label>Odo Start</label><input type="number" id="odo_start" placeholder="0"></div>
      <div class="falt"><label>Odo Stop</label><input type="number" id="odo_stop" placeholder="0"></div>
      <div class="falt"><label>Lit. Diesel</label><input type="number" id="lit_diesel" placeholder="0" step="0.01"></div>
      <div class="falt"><label class="cl">Mil Distance (auto)</label><input type="text" id="mil_distance" class="cf" readonly placeholder="0.00"></div>
    </div>
    <div class="grid grid-2 row">
      <div class="falt"><label class="cl">Diesel Consumption (auto)</label><input type="text" id="diesel_consumption" class="cf" readonly placeholder="0.00"></div>
    </div>
    <div class="btn-row">
      <button class="btn-p" id="spara-btn">Spara körning</button>
      <button class="btn-g" id="rensa-btn">Rensa</button>
      <div id="msg"></div>
    </div>
  </div>

  <div class="card">
    <div class="th">
      <div class="card-title" style="margin:0;border:none;padding:0">Registrerade körningar</div>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center">
        <div class="ar-filter"><select id="ar-val"><option value="">Alla år</option></select></div>
        <input type="date" id="fran-datum" title="Från datum">
        <span style="font-size:11px;color:var(--muted)">–</span>
        <input type="date" id="till-datum" title="Till datum">
        <input type="text" id="sok" placeholder="Sök rutt...">
        <button class="btn-g" id="skriv-ut-btn" title="Skriv ut">&#128438; Skriv ut</button>
        <button class="btn-g" id="csv-btn" title="Exportera CSV">&#11015; CSV</button>
        <button class="btn-g" id="backup-btn" title="Ladda ner databas">&#128190; Backup</button>
      </div>
    </div>
    <div class="print-header" id="print-header"></div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>Dag</th><th>Datum</th><th>Rutt</th>
            <th>Amount &#8369;</th><th>Diesel &#8369;</th>
            <th class="cc">Driver Income &#8369;</th><th class="cc">Remittance &#8369;</th>
            <th>Odo Start</th><th>Odo Stop</th>
            <th class="cc">Mil Dist.</th><th>Lit Diesel</th>
            <th class="cc">Diesel Cons.</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="13" class="tom">Laddar...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mo" id="modal">
  <div class="mi">
    <div class="mt">Redigera körning</div>
    <input type="hidden" id="eid">
    <div class="grid grid-2 row">
      <div class="falt"><label>Datum</label><input type="date" id="ed"></div>
      <div class="falt"><label class="cl">Dag (auto)</label><input type="text" id="edag" class="cf" readonly></div>
    </div>
    <div class="falt row"><label>Rutt</label><textarea id="erutt"></textarea></div>
    <div class="grid grid-4 row">
      <div class="falt"><label>Amount (&#8369;)</label><input type="text" id="ea"></div>
      <div class="falt"><label>Diesel (&#8369;)</label><input type="number" id="ediesel" step="0.01"></div>
      <div class="falt"><label class="cl">Driver Income (auto)</label><input type="text" id="edi" class="cf" readonly></div>
      <div class="falt"><label class="cl">Remittance (auto)</label><input type="text" id="er" class="cf" readonly></div>
    </div>
    <div class="grid grid-4 row">
      <div class="falt"><label>Odo Start</label><input type="number" id="eos"></div>
      <div class="falt"><label>Odo Stop</label><input type="number" id="eost"></div>
      <div class="falt"><label>Lit. Diesel</label><input type="number" id="eld" step="0.01"></div>
      <div class="falt"><label class="cl">Mil Distance (auto)</label><input type="text" id="emd" class="cf" readonly></div>
    </div>
    <div class="grid grid-2 row">
      <div class="falt"><label class="cl">Diesel Consumption (auto)</label><input type="text" id="edc" class="cf" readonly></div>
    </div>
    <div class="mb">
      <button class="btn-p" id="esave-btn">Spara ändringar</button>
      <button class="btn-g" id="eclose-btn">Avbryt</button>
      <span id="emsg" style="font-size:12px;color:var(--accent)"></span>
    </div>
  </div>
</div>

<script>
var allData = [];

function fmt(v) {
  if (v == null || v === "") return "-";
  return Number(v).toLocaleString("sv-SE", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtI(v) {
  if (!v && v !== 0) return "";
  return Number(v).toLocaleString("sv-SE", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function dag(ds) {
  if (!ds) return "";
  var d = new Date(ds + "T12:00:00");
  return ["Son","Man","Tis","Ons","Tor","Fre","Lor"][d.getDay()];
}
function getRaw(el) {
  var s = (el.dataset.raw || el.value || "").toString().replace(/\s/g,"").replace(/[^0-9.]/g,"");
  return parseFloat(s) || 0;
}
function setAmt(el, v) {
  el.dataset.raw = v || "";
  el.value = v ? Number(v).toLocaleString("sv-SE") : "";
}
function calc(aEl, dEl, osEl, ostEl, ldEl, diEl, rEl, mdEl, dcEl) {
  var a = getRaw(aEl), d = parseFloat(dEl.value)||0;
  var os = parseFloat(osEl.value)||0, ost = parseFloat(ostEl.value)||0;
  var ld = parseFloat(ldEl.value)||0;
  var net = a - d;
  var di = net * 0.25, r = net * 0.75;
  var md = (os && ost && ost > os) ? (ost - os) / 10 : 0;
  var dc = (ld && md > 0) ? ld / md : 0;
  diEl.value = fmtI(di); rEl.value = fmtI(r);
  mdEl.value = md ? md.toFixed(2) : "";
  dcEl.value = dc ? dc.toFixed(2) : "";
}

// Initialisera datum
document.getElementById("datum").value = new Date().toISOString().split("T")[0];
document.getElementById("dag").value = dag(document.getElementById("datum").value);
document.getElementById("datum").addEventListener("change", function() {
  document.getElementById("dag").value = dag(this.value);
});

// Amount formatering
document.getElementById("amount").addEventListener("input", function() {
  var raw = this.value.replace(/\s/g,"").replace(/[^0-9]/g,"");
  this.dataset.raw = raw;
  this.value = raw ? Number(raw).toLocaleString("sv-SE") : "";
  doCalc();
});
["diesel","odo_start","odo_stop","lit_diesel"].forEach(function(id) {
  document.getElementById(id).addEventListener("input", doCalc);
});

function doCalc() {
  calc(
    document.getElementById("amount"), document.getElementById("diesel"),
    document.getElementById("odo_start"), document.getElementById("odo_stop"),
    document.getElementById("lit_diesel"), document.getElementById("driver_income"),
    document.getElementById("remittance"), document.getElementById("mil_distance"),
    document.getElementById("diesel_consumption")
  );
}

// Rensa
document.getElementById("rensa-btn").addEventListener("click", function() {
  ["diesel","lit_diesel","odo_start","odo_stop","rutt"].forEach(function(id) { document.getElementById(id).value = ""; });
  ["driver_income","remittance","mil_distance","diesel_consumption"].forEach(function(id) { document.getElementById(id).value = ""; });
  setAmt(document.getElementById("amount"), "");
  document.getElementById("datum").value = new Date().toISOString().split("T")[0];
  document.getElementById("dag").value = dag(document.getElementById("datum").value);
});

// Spara
document.getElementById("spara-btn").addEventListener("click", function() {
  var btn = this; btn.disabled = true; btn.textContent = "Sparar...";
  fetch("/api/korjournal", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      datum: document.getElementById("datum").value,
      rutt: document.getElementById("rutt").value,
      amount: getRaw(document.getElementById("amount")),
      diesel: parseFloat(document.getElementById("diesel").value)||0,
      odo_start: document.getElementById("odo_start").value,
      odo_stop: document.getElementById("odo_stop").value,
      lit_diesel: document.getElementById("lit_diesel").value
    })
  }).then(function(res) {
    return res.json().then(function(d) { return {ok:res.ok, d:d}; });
  }).then(function(r) {
    visaMsg(r.d.meddelande, r.ok?"ok":"fel");
    if (r.ok) { document.getElementById("rensa-btn").click(); hamtaData(); }
  }).catch(function() { visaMsg("Anslutningsfel","fel"); })
  .finally(function() { btn.disabled=false; btn.textContent="Spara körning"; });
});

function visaMsg(txt, typ) {
  var el = document.getElementById("msg");
  el.textContent = (typ==="ok"?"✓ ":"✗ ") + txt;
  el.className = typ; el.style.display = "block";
  setTimeout(function() { el.style.display="none"; }, 3000);
}

// Tabell
document.getElementById("sok").addEventListener("input", filtrera);
document.getElementById("ar-val").addEventListener("change", function() {
  document.getElementById("fran-datum").value = "";
  document.getElementById("till-datum").value = "";
  hamtaData();
});
document.getElementById("fran-datum").addEventListener("change", filtrera);
document.getElementById("till-datum").addEventListener("change", filtrera);

function filtrera() {
  var s = document.getElementById("sok").value.toLowerCase();
  var fran = document.getElementById("fran-datum").value;
  var till = document.getElementById("till-datum").value;
  var fil = allData.filter(function(r) {
    var matchSok = (r.rutt||"").toLowerCase().indexOf(s) >= 0;
    var matchFran = !fran || r.datum >= fran;
    var matchTill = !till || r.datum <= till;
    return matchSok && matchFran && matchTill;
  });
  visaTabell(fil);
}

function visaTabell(lista) {
  var tb = document.getElementById("tbody");
  if (!lista.length) { tb.innerHTML = '<tr><td colspan="13" class="tom">Inga körningar registrerade</td></tr>'; return; }
  var sa=0, sd=0, sdi=0, sr=0;
  lista.forEach(function(r) { sa+=r.amount||0; sd+=r.diesel||0; sdi+=r.driver_income||0; sr+=r.remittance||0; });
  var html = lista.map(function(r) {
    return "<tr>" +
      "<td>" + (r.dag||"-") + "</td>" +
      "<td>" + (r.datum||"-") + "</td>" +
      "<td style='max-width:180px;overflow:hidden;text-overflow:ellipsis' title='" + (r.rutt||"") + "'>" + (r.rutt||"-") + "</td>" +
      "<td>" + fmt(r.amount) + "</td>" +
      "<td>" + fmt(r.diesel) + "</td>" +
      "<td class='cv'>" + fmt(r.driver_income) + "</td>" +
      "<td class='cv'>" + fmt(r.remittance) + "</td>" +
      "<td>" + (r.odo_start||"-") + "</td>" +
      "<td>" + (r.odo_stop||"-") + "</td>" +
      "<td class='cv'>" + (r.mil_distance!=null ? fmt(r.mil_distance) : "-") + "</td>" +
      "<td>" + (r.lit_diesel!=null ? r.lit_diesel : "-") + "</td>" +
      "<td class='cv'>" + (r.diesel_consumption!=null ? Number(r.diesel_consumption).toFixed(2) : "-") + "</td>" +
      "<td><button class='eb' onclick='oppna(" + r.id + ")' title='Redigera'>&#9998;</button> " +
      "<button class='db' onclick='del(" + r.id + ")' title='Ta bort'>&#x2715;</button></td></tr>";
  }).join("");
  html += "<tr class='sr'><td colspan='3'>Summa</td><td>" + fmt(sa) + "</td><td>" + fmt(sd) + "</td><td class='cv'>" + fmt(sdi) + "</td><td class='cv'>" + fmt(sr) + "</td><td colspan='6'></td></tr>";
  tb.innerHTML = html;
}

function hamtaData() {
  var ar = document.getElementById("ar-val").value;
  fetch("/api/korjournal" + (ar ? "?ar=" + ar : ""))
    .then(function(r) { return r.json(); })
    .then(function(d) { allData = d; filtrera(); });
}

function hamtaAr() {
  fetch("/api/ar").then(function(r) { return r.json(); }).then(function(ar) {
    var sel = document.getElementById("ar-val");
    ar.forEach(function(a) { var o = document.createElement("option"); o.value=a; o.textContent=a; sel.appendChild(o); });
    if (ar.length) sel.value = ar[0];
    hamtaData();
  });
}

function del(id) {
  if (!confirm("Ta bort denna körning?")) return;
  fetch("/api/korjournal/" + id, {method:"DELETE"}).then(function() {
    allData = allData.filter(function(r) { return r.id !== id; }); filtrera();
  });
}

// Modal
function oppna(id) {
  var r = allData.filter(function(x) { return x.id === id; })[0];
  if (!r) return;
  document.getElementById("eid").value = r.id;
  document.getElementById("ed").value = r.datum || "";
  document.getElementById("edag").value = dag(r.datum);
  document.getElementById("erutt").value = r.rutt || "";
  document.getElementById("ediesel").value = r.diesel || "";
  document.getElementById("eos").value = r.odo_start || "";
  document.getElementById("eost").value = r.odo_stop || "";
  document.getElementById("eld").value = r.lit_diesel || "";
  setAmt(document.getElementById("ea"), r.amount);
  eCalc();
  document.getElementById("modal").classList.add("open");
}

function stang() { document.getElementById("modal").classList.remove("open"); }
document.getElementById("eclose-btn").addEventListener("click", stang);
document.getElementById("modal").addEventListener("click", function(e) { if (e.target===this) stang(); });

document.getElementById("ed").addEventListener("change", function() { document.getElementById("edag").value = dag(this.value); });
document.getElementById("ea").addEventListener("input", function() {
  var raw = this.value.replace(/\s/g,"").replace(/[^0-9]/g,"");
  this.dataset.raw = raw; this.value = raw ? Number(raw).toLocaleString("sv-SE") : ""; eCalc();
});
["ediesel","eos","eost","eld"].forEach(function(id) { document.getElementById(id).addEventListener("input", eCalc); });

function eCalc() {
  calc(document.getElementById("ea"), document.getElementById("ediesel"),
    document.getElementById("eos"), document.getElementById("eost"),
    document.getElementById("eld"), document.getElementById("edi"),
    document.getElementById("er"), document.getElementById("emd"), document.getElementById("edc"));
}

document.getElementById("esave-btn").addEventListener("click", function() {
  var btn = this, id = document.getElementById("eid").value;
  btn.disabled=true; btn.textContent="Sparar...";
  fetch("/api/korjournal/" + id, {
    method: "PUT", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      datum: document.getElementById("ed").value,
      rutt: document.getElementById("erutt").value,
      amount: getRaw(document.getElementById("ea")),
      diesel: parseFloat(document.getElementById("ediesel").value)||0,
      odo_start: document.getElementById("eos").value,
      odo_stop: document.getElementById("eost").value,
      lit_diesel: document.getElementById("eld").value
    })
  }).then(function(res) {
    if (res.ok) { stang(); hamtaData(); }
    else { document.getElementById("emsg").textContent = "Fel vid sparning"; }
  }).catch(function() { document.getElementById("emsg").textContent = "Anslutningsfel"; })
  .finally(function() { btn.disabled=false; btn.textContent="Spara ändringar"; });
});

// ── Utskrift ──
document.getElementById("skriv-ut-btn").addEventListener("click", function() {
  var fran = document.getElementById("fran-datum").value;
  var till = document.getElementById("till-datum").value;
  var period = fran || till ? (fran||"?") + " – " + (till||"?") : "Alla datum";
  var h = document.getElementById("print-header");
  h.textContent = "Körjournal  |  Period: " + period + "  |  Utskriven: " + new Date().toLocaleDateString("sv-SE");
  window.print();
});

// ── CSV-export ──
document.getElementById("csv-btn").addEventListener("click", function() {
  var fran = document.getElementById("fran-datum").value;
  var till = document.getElementById("till-datum").value;
  var s = document.getElementById("sok").value.toLowerCase();
  var fil = allData.filter(function(r) {
    return (r.rutt||"").toLowerCase().indexOf(s) >= 0 &&
           (!fran || r.datum >= fran) && (!till || r.datum <= till);
  });
  var rader = [["Dag","Datum","Rutt","Amount","Diesel","Driver Income","Remittance","Odo Start","Odo Stop","Mil Distance","Lit Diesel","Diesel Consumption"]];
  fil.forEach(function(r) {
    rader.push([
      r.dag||"", r.datum||"", r.rutt||"",
      (r.amount||0).toFixed(2), (r.diesel||0).toFixed(2),
      (r.driver_income||0).toFixed(2), (r.remittance||0).toFixed(2),
      r.odo_start||"", r.odo_stop||"",
      r.mil_distance!=null ? Number(r.mil_distance).toFixed(2) : "",
      r.lit_diesel||"",
      r.diesel_consumption!=null ? Number(r.diesel_consumption).toFixed(2) : ""
    ]);
  });
  var csv = rader.map(function(rad) {
    return rad.map(function(v) { return '"' + String(v).replace(/"/g,'""') + '"'; }).join(";");
  }).join("\n");
  var blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
  var a = document.createElement("a");
  var period = (fran||"") + (fran&&till?"_till_":"") + (till||"") || "alla";
  a.href = URL.createObjectURL(blob);
  a.download = "korjournal_" + period + ".csv";
  a.click();
});

// ── Backup ──
document.getElementById("backup-btn").addEventListener("click", function() {
  window.location.href = "/api/backup";
});

hamtaAr();
</script>
